<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Pro - Settings</title>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = '/login'; }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }
    </script>
    <link rel="stylesheet" href="css/tailwind-build.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-screen w-full overflow-hidden flex flex-col selection:bg-cyan-500/30">

    <header class="flex-none px-6 py-4 border-b border-white/5 bg-slate-900/80 z-20 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div>
                <a href="/">
                <h1 class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight hover:scale-105 transition-transform duration-200 cursor-pointer">
                    SmartGate Pro</h1>
                </a>
                <p class="text-slate-400 text-xs md:text-sm mt-0.5">System Configuration & Integration</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex gap-3">
                <a href="/" class="btn-hover bg-slate-800 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium border border-slate-700 shadow-lg flex items-center gap-2">
                    🏠 หน้าหลัก
                </a>
                <a href="/manage" class="btn-hover bg-slate-700/50 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium border border-slate-500 shadow-lg flex items-center gap-2">
                    👨‍🎓 จัดการข้อมูล
                </a>
                <button onclick="logout()" class="btn-hover bg-rose-900/50 text-rose-200 px-4 py-2 rounded-lg text-sm font-medium border border-rose-800 shadow-lg flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    ออกจากระบบ
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 min-h-0 flex justify-center items-start p-6 md:p-12 gap-6 overflow-y-auto w-full mx-auto">
        <div class="glass-card w-full max-w-3xl p-8 border-t-4 border-cyan-500 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                <span class="text-3xl">⚙️</span> ตั้งค่าระบบ (System Settings)
            </h2>
            
            <form id="settingsForm" class="space-y-8">
                
                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700/50 relative overflow-hidden group hover:border-cyan-500/50 transition-colors">
                    <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                    <div class="flex items-start gap-4">
                        <div class="p-3 bg-emerald-500/10 rounded-lg text-emerald-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <div class="flex-1 w-full">
                            <label class="block text-sm font-bold text-slate-300 uppercase tracking-widest mb-1">เวลาเข้าเรียนสาย <span class="text-rose-400">*</span></label>
                            <p class="text-xs text-slate-500 mb-3">กำหนดเวลาที่จะให้ระบบนับว่า "สาย" หากสแกนเข้าหลังจากเวลาดังกล่าว (เช่น 08:30)</p>
                            <input type="time" id="lateTimeInput" required class="w-full md:w-48 bg-slate-950 border border-slate-700 text-cyan-400 text-lg rounded-lg outline-none px-4 py-3 focus:border-cyan-500 transition-colors shadow-inner font-mono">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700/50 relative overflow-hidden group hover:border-cyan-500/50 transition-colors">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <div class="flex items-start gap-4">
                        <div class="p-3 bg-blue-500/10 rounded-lg text-blue-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        </div>
                        <div class="flex-1 w-full">
                            <label class="block text-sm font-bold text-slate-300 uppercase tracking-widest mb-1">LINE Notify Token</label>
                            <p class="text-xs text-slate-500 mb-3">โทเคนสำหรับการส่งการแจ้งเตือนเข้าผู้ปกครองผ่านไลน์ส่วนตัว นำมาจาก <a href="https://notify-bot.line.me" target="_blank" class="text-cyan-400 hover:underline">LINE Notify</a></p>
                            <input type="password" id="lineTokenInput" placeholder="ใส่ LINE Token ของคุณ..." class="w-full bg-slate-950 border border-slate-700 text-cyan-400 rounded-lg outline-none px-4 py-3 focus:border-cyan-500 transition-colors shadow-inner font-mono text-sm leading-none">
                            <div class="mt-2 flex items-center gap-2">
                                <input type="checkbox" id="showTokenToggle" class="accent-cyan-500 w-4 h-4 cursor-pointer" onchange="toggleTokenVisibility()">
                                <label for="showTokenToggle" class="text-xs text-slate-400 cursor-pointer user-select-none">แสดงโทเคน</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-4 border-t border-white/5">
                    <button type="button" onclick="loadSettings()" class="px-6 py-3 rounded-lg text-slate-300 font-bold hover:bg-slate-800 transition-colors">↩️ รีเซ็ตค่าเดิม</button>
                    <button type="submit" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white px-8 py-3 rounded-lg font-bold shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all transform hover:-translate-y-1">💾 บันทึกการตั้งค่า</button>
                </div>
            </form>
            
            <!-- Alert Box -->
            <div id="settingsAlertBox" class="mt-6 hidden p-4 rounded-lg flex items-center gap-3 font-semibold transition-all">
                <span id="alertIcon"></span>
                <p id="alertMsg"></p>
            </div>
            
        </div>
    </main>

    <script>
        function toggleTokenVisibility() {
            const input = document.getElementById('lineTokenInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const result = await res.json();
                if (result.success && result.data) {
                    document.getElementById('lateTimeInput').value = result.data.LATE_TIME || "08:30";
                    document.getElementById('lineTokenInput').value = result.data.LINE_TOKEN || "";
                }
            } catch (err) {
                console.error("Failed to load settings:", err);
                showAlert("error", "ไม่สามารถดึงข้อมูลการตั้งค่าได้ กรุณาลองใหม่");
            }
        }

        function showAlert(type, message) {
            const alertBox = document.getElementById('settingsAlertBox');
            const alertMsg = document.getElementById('alertMsg');
            const alertIcon = document.getElementById('alertIcon');
            
            alertBox.className = "mt-6 p-4 rounded-lg flex items-center gap-3 font-semibold transition-all"; // reset class
            if(type === 'success') {
                alertBox.classList.add("bg-emerald-500/20", "text-emerald-400", "border", "border-emerald-500/50");
                alertIcon.innerText = "✅";
            } else {
                alertBox.classList.add("bg-rose-500/20", "text-rose-400", "border", "border-rose-500/50");
                alertIcon.innerText = "❌";
            }
            alertMsg.innerText = message;
            alertBox.classList.remove('hidden');

            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const lateTime = document.getElementById('lateTimeInput').value;
            const lineToken = document.getElementById('lineTokenInput').value;

            try {
                const res = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ late_time: lateTime, line_token: lineToken })
                });
                const result = await res.json();
                if (result.success) {
                    showAlert("success", "บันทึกการตั้งค่าระบบเรียบร้อยแล้ว");
                } else {
                    showAlert("error", result.message || "เกิดข้อผิดพลาดในการบันทึก");
                }
            } catch (err) {
                console.error("Save error:", err);
                showAlert("error", "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์");
            }
        });

        // Initialize Settings
        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>
