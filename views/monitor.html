<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Pro | Gate Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #000; color: #fff; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        #webcam { transform: scaleX(-1); border-radius: 20px; box-shadow: 0 0 50px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8">

    <div class="absolute top-8 left-8 flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
            <span class="text-2xl">🛡️</span>
        </div>
        <div>
            <h1 class="text-2xl font-black text-white leading-tight">GATE MONITOR</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Active Scan & Face AI Processor</p>
        </div>
    </div>

    <div class="relative w-full max-w-4xl aspect-[4/3] glass rounded-[40px] p-4 flex flex-col items-center justify-center">
        <!-- AI Loading Overlay -->
        <div id="aiLoader" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90 backdrop-blur-xl rounded-[40px] transition-opacity duration-1000">
            <div class="w-20 h-20 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-6"></div>
            <h2 class="text-xl font-black text-white uppercase tracking-[0.2em]">Initializing AI Engine</h2>
            <p class="text-slate-500 text-xs font-bold uppercase mt-2 tracking-widest">Loading Facial Feature Models...</p>
        </div>

        <video id="webcam" autoplay muted playsinline class="w-full h-full object-cover"></video>
        
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-4 px-8 py-4 glass rounded-full border border-blue-500/30">
            <div id="statusDot" class="status-dot bg-slate-500 animate-pulse"></div>
            <span id="statusText" class="text-sm font-black uppercase tracking-widest text-slate-400">System Standby</span>
        </div>
    </div>

    <!-- Latest Scan Preview -->
    <div id="scanOverlay" class="fixed top-8 right-8 w-64 glass rounded-[30px] p-6 border-l-4 border-emerald-500 transform translate-x-80 transition-transform duration-500 shadow-2xl">
        <div class="flex items-center gap-4 mb-4">
            <img id="scanPhoto" class="w-16 h-16 rounded-2xl object-cover border-2 border-emerald-500/30" src="">
            <div>
                <div class="text-[9px] text-emerald-400 font-bold uppercase">Success</div>
                <div id="scanName" class="text-lg font-black text-white leading-none">-</div>
            </div>
        </div>
        <div class="text-[10px] text-slate-500 font-bold uppercase">Attendance Logged</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/face_ai.js?v=3"></script>
    <script src="/js/monitor.js"></script>
</body>
</html>
